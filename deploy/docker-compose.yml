services:
  tel-bot:
    image: ghcr.io/mrhasanzadeh/tel-bot:latest
    container_name: tel-bot
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: tel-bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_REPO_USER: ${GHCR_USERNAME:-}
      WATCHTOWER_REPO_PASS: ${GHCR_TOKEN:-}
    env_file:
      - .env
