services:
  tel-bot:
    image: ghcr.io/mrhasanzadeh/tel-bot:latest
    container_name: tel-bot
    restart: unless-stopped
    env_file:
      - .env
    # Optional: same network as shiori-postgres (uncomment and set network name)
    # networks:
    #   - shiori
    labels:
      - com.centurylinklabs.watchtower.enable=true

# networks:
#   shiori:
#     external: true
#     name: api_default

  watchtower:
    # containrrr/watchtower is unmaintained and breaks on Docker Engine 29+ (API >= 1.40)
    # GHCR: ghcr.io/nicholas-fedor/watchtower:latest
    image: nickfedor/watchtower:latest
    container_name: tel-bot-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_API_VERSION: ${DOCKER_API_VERSION:-1.44}
      WATCHTOWER_POLL_INTERVAL: ${WATCHTOWER_POLL_INTERVAL:-300}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
      WATCHTOWER_REPO_USER: ${GHCR_USERNAME:-}
      WATCHTOWER_REPO_PASS: ${GHCR_TOKEN:-}
    env_file:
      - .env
